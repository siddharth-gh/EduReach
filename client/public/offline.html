<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduReach Offline</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f5fbf7 0%, #eef5f1 100%);
        color: #163029;
      }

      main {
        width: min(420px, calc(100% - 32px));
        background: rgba(255, 255, 255, 0.92);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 22px 50px rgba(29, 64, 54, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: #4b635b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>EduReach can still show cached pages and previously loaded learning content.</p>
      <p>Reconnect to load new courses, quizzes, or account changes.</p>
    </main>
  </body>
</html>
